<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/prodeFifa/" />
  <title>Prode Fifa 2026 · Partidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <script src="./assets/config.js"></script>

</html>
