<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leandro Ferro · lferro.com.ar</title>
  <meta name="description" content="Sitio personal de Leandro Ferro. Proyectos, experimentos y herramientas." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg-1: #0f1226;
      --bg-2: #1a1d3a;
      --primary: #6c5ce7;
      --accent: #ff7eb9;
      --accent-2: #7afcff;
      --ink: #f3f4ff;
      --ink-soft: #b9bdd6;
      --line: #2a2e52;
      --card: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 10% -10%, #ff7eb955, transparent 60%),
        radial-gradient(800px 600px at 100% 0%, #6c5ce755, transparent 60%),
        radial-gradient(900px 600px at 50% 100%, #7afcff33, transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 60px 22px 80px;
    }

    /* Hero */
    .hero {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .avatar {
      width: 110px; height: 110px;
      border-radius: 32px;
      background: linear-gradient(135deg, var(--accent), var(--primary), var(--accent-2));
      display: grid; place-items: center;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 44px;
      color: white;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      letter-spacing: -1px;
    }
    .hero-text h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: clamp(34px, 5vw, 52px);
      margin: 0 0 8px;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, #b9bdd6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-text p {
      margin: 0 0 16px;
      color: var(--ink-soft);
      font-size: 16px;
      max-width: 520px;
      line-height: 1.55;
    }
    .socials {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .socials a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all .2s;
    }
    .socials a:hover {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .socials svg { width: 18px; height: 18px; }

    /* Section */
    .section-title {
      display: flex; align-items: center; gap: 12px;
      margin: 0 0 24px;
      font-family: 'Fredoka', sans-serif;
      font-size: 22px;
      font-weight: 600;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 22px;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--accent), var(--primary));
    }
    .section-title .count {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--card);
      border: 1px solid var(--line);
      padding: 3px 10px;
      border-radius: 999px;
      margin-left: auto;
    }

    /* Projects grid */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .project {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--ink);
      transition: all .2s;
      overflow: hidden;
      cursor: pointer;
    }
    .project::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--proj-color, var(--primary)), transparent 60%);
      opacity: 0.15;
      transition: opacity .25s;
      pointer-events: none;
    }
    .project:hover {
      transform: translateY(-4px);
      border-color: var(--proj-color, var(--primary));
      box-shadow: 0 16px 40px -12px var(--proj-color, var(--primary));
    }
    .project:hover::before { opacity: 0.28; }
    .project.disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    .project.disabled:hover {
      transform: none;
      border-color: var(--line);
      box-shadow: none;
    }
    .project.disabled:hover::before { opacity: 0.15; }

    .proj-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--proj-color, var(--primary));
      display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 6px 18px -6px var(--proj-color, var(--primary));
      position: relative;
      z-index: 1;
    }
    .proj-name {
      font-weight: 700;
      font-size: 17px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .proj-name .wip {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--ink-soft);
      text-transform: uppercase;
    }
    .proj-desc {
      color: var(--ink-soft);
      font-size: 13.5px;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    .proj-link {
      margin-top: auto;
      font-size: 13px;
      font-weight: 600;
      color: var(--proj-color, var(--primary));
      display: inline-flex;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 1;
      padding-top: 6px;
    }
    .proj-link.muted { color: var(--ink-soft); }

    /* Footer */
    footer {
      margin-top: 64px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 13px;
    }
    footer a { color: var(--ink-soft); text-decoration: underline; text-decoration-color: var(--line); }
    footer a:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <header class="hero">
      <div class="avatar">LF</div>
      <div class="hero-text">
        <h1>Leandro Ferro</h1>
        <p>Bienvenido a mi sitio personal. Acá vas a encontrar mis proyectos, experimentos y algunas herramientas que armo en el camino.</p>
        <div class="socials">
          <a href="https://www.linkedin.com/in/leandrodferro/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.5 18V10h-3v8h3zM7 8.7a1.7 1.7 0 1 0 0-3.4 1.7 1.7 0 0 0 0 3.4zM18.5 18v-4.6c0-2.4-1.3-3.6-3-3.6-1.4 0-2 .8-2.4 1.3V10H10v8h3v-4.5c0-1.2.8-1.8 1.7-1.8s1.6.5 1.6 1.8V18h2.2z"/></svg>
            LinkedIn
          </a>
          <a href="mailto:hola@lferro.com.ar" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="2,7 12,13 22,7"/></svg>
            Email
          </a>
        </div>
      </div>
    </header>

    <!-- Proyectos -->
    <section>
      <h2 class="section-title">
        Proyectos
        <span class="count">6</span>
      </h2>
      <div class="projects" id="projects"></div>
    </section>

    <footer>
      <p>© <span id="year"></span> Leandro Ferro · <a href="https://www.linkedin.com/in/leandrodferro/" target="_blank" rel="noopener noreferrer">LinkedIn</a></p>
    </footer>
  </div>

  <script>
    const PROJECTS = [
      {
        name: 'soyjime.com.ar',
        icon: '👶',
        color: '#ff7eb9',
        desc: 'Sitio personal y portfolio de Jime.',
        href: 'https://www.soyjime.com.ar',
        external: true
      },
      {
        name: 'FrancisProde',
        icon: '🎯',
        color: '#7afcff',
        desc: 'Prode entre amigos: ¿qué día y a qué hora nace Francisco?',
        href: '/francisprode/',
        external: false
      },
      {
        name: 'Prode Fifa 2026',
        icon: '⚽',
        color: '#06d6a0',
        desc: 'Prode del Mundial 2026 entre amigos.',
        href: '/prodeFifa/',
        external: false
      },
      {
        name: 'Tablero de Cambios',
        icon: '📋',
        color: '#22d3ee',
        desc: 'Kanban para gestionar proyectos tecnológicos.',
        href: '/tablero/',
        external: false
      },
      {
        name: 'uniq+ Salón de belleza',
        icon: '✨',
        color: '#c97a85',
        desc: 'Sitio del salón con turnero online: pelo, masajes y manicura.',
        href: '/uniqmas/',
        external: false
      },
      {
        name: 'Gestión FerroSan',
        icon: '🔧',
        color: '#6c5ce7',
        desc: 'E-commerce y gestión de la ferretería.',
        href: 'https://ferreteria-ecommerce-psi.vercel.app/',
        external: true
      }
    ];

    const grid = document.getElementById('projects');
    PROJECTS.forEach(p => {
      const isLink = !!p.href;
      const el = document.createElement(isLink ? 'a' : 'div');
      el.className = 'project' + (isLink ? '' : ' disabled');
      el.style.setProperty('--proj-color', p.color);
      if (isLink) {
        el.href = p.href;
        if (p.external) {
          el.target = '_blank';
          el.rel = 'noopener noreferrer';
        }
      }
      el.innerHTML = `
        <div class="proj-icon">${p.icon}</div>
        <div class="proj-name">
          ${p.name}
          ${p.wip ? '<span class="wip">WIP</span>' : ''}
        </div>
        <div class="proj-desc">${p.desc}</div>
        <div class="proj-link ${isLink ? '' : 'muted'}">
          ${isLink
            ? (p.external ? 'Abrir sitio ↗' : 'Entrar →')
            : 'Próximamente'}
        </div>
      `;
      grid.appendChild(el);
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
